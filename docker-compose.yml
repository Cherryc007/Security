#version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: securops_user
      POSTGRES_PASSWORD: securops_password
      POSTGRES_DB: securops
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U securops_user -d securops" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://securops_user:securops_password@db:5432/securops?schema=public
      - JWT_ACCESS_SECRET=securops_super_secret_key_change_in_prod_2024
      - JWT_REFRESH_SECRET=securops_refresh_super_secret_key_change_in_prod_2024
      - JWT_ACCESS_EXPIRES_IN=15m
      - JWT_REFRESH_EXPIRES_IN=7d
      - CORS_ORIGIN=http://localhost:3000,http://localhost:8081
      - SOCKET_CORS_ORIGIN=http://localhost:3000,http://localhost:8081
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm start"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
